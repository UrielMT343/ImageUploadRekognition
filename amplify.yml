version: 1
frontend:
  phases:
    prebuild:
      commands:
        - cd image-upload-rekognition
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: image-upload-rekognition/.next
    files:
      - '**/*'
  cache:
    paths:
      - image-upload-rekognition/node_modules/**/* 
