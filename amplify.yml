version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd ImageUploadRekognition
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: ImageUploadRekognition/.next
    files:
      - '**/*'
  cache:
    paths:
      - ImageUploadRekognition/node_modules/**/*