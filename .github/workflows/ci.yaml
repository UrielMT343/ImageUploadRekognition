name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - "src/**"
              - "public/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig.json"
              - "next.config.*"
              - "postcss.config.*"
              - "tailwind.config.*"
              - ".github/workflows/ci.yml"

  build:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
